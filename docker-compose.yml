services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: uncomfirmatives
      POSTGRES_USER: app
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d uncomfirmatives"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: uncomfirmatives
      DB_USER: app
      DB_PASS: apppass
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
